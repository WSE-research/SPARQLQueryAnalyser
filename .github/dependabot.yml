# Grouped, weekly dependency updates (replaces the previous daily, ungrouped
# config). Minor+patch batched per ecosystem; majors arrive individually.
version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: "/SPARQLAnalyser"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/API"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
